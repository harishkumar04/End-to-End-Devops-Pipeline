apiVersion: apps/v1
kind: Deployment

metadata:
  name: task-app
  namespace: devops-project

spec:

  replicas: 2

  selector:
    matchLabels:
      app: task-app

  template:

    metadata:
      labels:
        app: task-app

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"

    spec:

      containers:
      - name: task-app

        image: harishkumar09/task-app:v2

        ports:
        - containerPort: 3000

        env:

        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_HOST

        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_PORT

        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_NAME

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
